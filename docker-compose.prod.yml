version: '3.8'

# Production Docker Compose
# Prerequisites:
#   1. Create backend/.env.production from backend/.env.example
#   2. Set DB_PASSWORD and VITE_API_URL in the shell or a root-level .env file
#      export DB_PASSWORD=<strong-random-password>
#      export VITE_API_URL=https://your-domain.com/api
#
# Run: docker-compose -f docker-compose.prod.yml up -d --build

services:
  # 1. Database Production
  postgres:
    image: postgres:15-alpine
    container_name: elfatoora_db
    restart: always
    environment:
      POSTGRES_USER: elfatoora
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      POSTGRES_DB: elfatooradb
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elfatoora -d elfatooradb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: elfatoora_backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env.production
    volumes:
      - ./backend/uploads:/app/uploads
    # Port 5005 is NOT exposed publicly — Nginx reaches it via the internal network.
    networks:
      - elfatoora_network

  # 3. Frontend Service (Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Must point to the public API URL (e.g. https://api.your-domain.com/api)
        - VITE_API_URL=${VITE_API_URL:?VITE_API_URL must be set}
    container_name: elfatoora_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - elfatoora_network

networks:
  elfatoora_network:
    driver: bridge

volumes:
  pgdata:
    driver: local
