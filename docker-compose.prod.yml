version: '3.8'

services:
  # 1. Database Production
  postgres:
    image: postgres:15-alpine
    container_name: elfatoora_db
    restart: always
    environment:
      POSTGRES_USER: elfatoora
      POSTGRES_PASSWORD: secretpassword # REMPLACER PAR UN MOT DE PASSE SECRET
      POSTGRES_DB: elfatooradb
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elfatoora -d elfatooradb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: elfatoora_backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env.production
    volumes:
      - ./backend/uploads:/app/uploads
    # Le port 5005 est retiré des ports publics pour plus de sécurité.
    # Il reste accessible à Nginx via le réseau 'elfatoora_network'.
    networks:
      - elfatoora_network

  # 3. Frontend Service (Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # VITE_API_URL pointant vers le domaine final par défaut ou IP
        - VITE_API_URL=http://localhost:5005/api 
    container_name: elfatoora_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - elfatoora_network

networks:
  elfatoora_network:
    driver: bridge

volumes:
  pgdata:
    driver: local
